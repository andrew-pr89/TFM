<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Globe circle -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#3db85a" stroke-width="5"/>
  <!-- Horizontal equator line -->
  <line x1="4" y1="50" x2="96" y2="50" stroke="#3db85a" stroke-width="3"/>
  <!-- Continent silhouettes (simplified) -->
  <!-- Americas -->
  <path d="M28,22 C26,28 22,32 24,40 C26,48 24,54 26,60 C28,66 24,72 26,78"
        fill="none" stroke="#3db85a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Europe/Africa -->
  <path d="M48,18 C50,24 52,30 50,38 C48,46 50,52 50,60 C50,68 48,74 50,80"
        fill="none" stroke="#3db85a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Pulse/heartbeat line overlaid -->
  <polyline
    points="4,50 20,50 28,32 38,68 48,18 58,80 68,50 96,50"
    fill="none" stroke="#3db85a" stroke-width="4.5"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
